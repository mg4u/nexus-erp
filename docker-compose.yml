version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_erp}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_secret_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-saas_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ─── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-erp-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ─── Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: saas-erp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_secret_password}@postgres:5432/${POSTGRES_DB:-saas_erp}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80,http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend_logs:/app/logs
    healthcheck:
      # Use wget --spider to do a HEAD-like check — exits non-zero only on connection failure or 4xx/5xx
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health 2>&1 | grep -q '200 OK' || wget -qO- http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 30s
      timeout: 15s
      start_period: 40s
      retries: 5
    networks:
      - erp-network

  # ─── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: saas-erp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${FRONTEND_PORT:-80} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - erp-network

  # ─── Database migration runner (one-shot) ──────────────────────
  # Uses `prisma db push` to sync schema changes without requiring
  # migration history (safe for this project bootstrapped with db push).
  # Usage:
  #   docker compose --profile migrate up migrate
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: saas-erp-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_secret_password}@postgres:5432/${POSTGRES_DB:-saas_erp}
    command: >
      sh -c "
        echo '▶ Syncing schema with prisma db push...' &&
        npx prisma db push --skip-generate &&
        echo '▶ Seeding database...' &&
        npx ts-node --transpile-only prisma/seed.ts &&
        echo '✅ Schema sync and seeding complete!'
      "
    volumes:
      # Mount live prisma dir so schema changes are picked up without rebuilding the image
      - ./backend/prisma:/app/prisma
      # Protect the container's node_modules from the bind mount
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network
    profiles:
      - migrate


volumes:
  postgres_data:
    name: saas-erp-postgres-data
  redis_data:
    name: saas-erp-redis-data
  # backend_logs:
  #   name: saas-erp-backend-logs

networks:
  erp-network:
    name: saas-erp-network
    driver: bridge
